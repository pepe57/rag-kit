language: python

tasks:
  # Generate all templates from golden masters
  # Note: Caching disabled because inputs come from outside this project
  generate-all:
    command: uv run python generate_templates.py --all --force
    inputs:
      - "generate_templates.py"
    options:
      cache: false

  # Generate individual templates
  generate-sys-config:
    command: uv run python generate_templates.py --template sys-config --force
    inputs:
      - "generate_templates.py"

  generate-chainlit-chat:
    command: uv run python generate_templates.py --template chainlit-chat --force
    inputs:
      - "generate_templates.py"
    options:
      cache: false

  generate-reflex-chat:
    command: uv run python generate_templates.py --template reflex-chat --force
    inputs:
      - "generate_templates.py"
    options:
      cache: false

  generate-albert:
    command: uv run python generate_templates.py --template albert --force
    inputs:
      - "generate_templates.py"
    options:
      cache: false

  generate-config:
    command: uv run python generate_templates.py --template config --force
    inputs:
      - "generate_templates.py"
    options:
      cache: false

  generate-full-context:
    command: uv run python generate_templates.py --template full-context --force
    inputs:
      - "generate_templates.py"
    options:
      cache: false

  generate-chroma-context:
    command: uv run python generate_templates.py --template chroma-context --force
    inputs:
      - "generate_templates.py"

  # Code quality tasks (run from workspace root)
  format:
    command: uv run ruff format .
    options:
      runFromWorkspaceRoot: true
      cache: false

  format-check:
    command: uv run ruff format --check .
    options:
      runFromWorkspaceRoot: true
      cache: false

  lint:
    command: uv run ruff check .
    options:
      runFromWorkspaceRoot: true
      cache: false

  lint-fix:
    command: uv run ruff check --fix .
    options:
      runFromWorkspaceRoot: true
      cache: false

  type-check:
    command: uv run ty check . --exclude ".moon/templates" --exclude "apps/chainlit-chat/app.py" --exclude "apps/reflex-chat/reflex_chat/state.py"
    options:
      runFromWorkspaceRoot: true
      cache: false
