[project]
name = "ragtime-lib"
version = "0.26.0" # x-release-please-version
description = "RAG Facile - Python library for building RAG applications for the French government"
readme = "README.md"
requires-python = ">=3.13"
license = { text = "MIT" }
authors = [{ name = "Etalab", email = "etalab@modernisation.gouv.fr" }]
keywords = ["rag", "retrieval-augmented-generation", "french-government", "albert"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "albert-client",
    "pypdf>=5.0.0",
    "tomli-w>=1.0.0",
]

[project.urls]
Homepage = "https://github.com/etalab-ia/ragtime"
Documentation = "https://github.com/etalab-ia/ragtime/blob/main/docs/guides/getting-started.md"
Repository = "https://github.com/etalab-ia/ragtime"
Issues = "https://github.com/etalab-ia/ragtime/issues"

[tool.uv.sources]
albert-client = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = []

[tool.hatch.build.targets.wheel.force-include]
"../context/src/ragtime/context" = "ragtime/context"
"../ingestion/src/ragtime/ingestion" = "ragtime/ingestion"
"../pipelines/src/ragtime/pipelines" = "ragtime/pipelines"
"../query/src/ragtime/query" = "ragtime/query"
"../rag-core/src/ragtime/core" = "ragtime/core"
"../rag-core/presets" = "ragtime/core/presets"
"../reranking/src/ragtime/reranking" = "ragtime/reranking"
"../retrieval/src/ragtime/retrieval" = "ragtime/retrieval"
"../storage/src/ragtime/storage" = "ragtime/storage"
"../tracing/src/ragtime/tracing" = "ragtime/tracing"
