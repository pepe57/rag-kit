[project]
name = "evaluation"
version = "0.19.0" # x-release-please-version
description = "RAG evaluation with Inspect AI - recall@k, precision@k, faithfulness"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "httpx",
    "inspect-ai>=0.3.0",
    "rag-core",
]

[tool.uv.sources]
rag-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rag_facile"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
