# RAG Facile Configuration - Balanced Preset
# Recommended default with good quality/speed tradeoff
# Generated by: rag-facile setup

[meta]
schema_version = "1.0.0"
preset = "balanced"

# ==============================================================================
# EVALUATION DATASET GENERATION
# ==============================================================================
[eval]
provider = "albert"
target_samples = 50
output_format = "jsonl"

# ==============================================================================
# DOCUMENT INGESTION
# ==============================================================================
[ingestion]
file_types = [".pdf", ".md", ".txt"]

[ingestion.ocr]
enabled = true
dpi = 300
extract_images = false
include_bounding_boxes = false

[ingestion.parsing]
output_format = "markdown"
preserve_structure = true
include_page_numbers = true

# ==============================================================================
# DOCUMENT CHUNKING
# ==============================================================================
[chunking]
strategy = "semantic"
chunk_size = 512
chunk_overlap = 50
preserve_metadata = true

# ==============================================================================
# EMBEDDING GENERATION
# ==============================================================================
[embedding]
model = "openweight-embeddings"
batch_size = 32
normalization = "L2"

# ==============================================================================
# VECTOR STORAGE / INDEX
# ==============================================================================
[storage]
backend = "albert-collections"
collection_naming = "workspace"
distance_metric = "cosine"

# ==============================================================================
# QUERY ENHANCEMENT
# ==============================================================================
[query]
rewrite_enabled = false
expand_enabled = false
spell_check = false

# ==============================================================================
# RETRIEVAL
# ==============================================================================
[retrieval]
method = "hybrid"
top_k = 10
score_threshold = 0.0

[retrieval.hybrid]
alpha = 0.5  # Balanced semantic/lexical

# ==============================================================================
# RERANKING
# ==============================================================================
[reranking]
enabled = true
model = "openweight-rerank"
top_n = 3

# ==============================================================================
# CONTEXT SELECTION
# ==============================================================================
[context]
strategy = "token-budget"
max_tokens = 4096
deduplicate = true
ordering = "by-score"

[context.formatting]
include_citations = true
citation_style = "inline"

# ==============================================================================
# RESPONSE GENERATION
# ==============================================================================
[generation]
model = "openweight-medium"
temperature = 0.7
max_tokens = 1024
streaming = true
system_prompt = """You are a helpful assistant for the French government.
Answer questions based on the provided context.
Always cite your sources using [1], [2], etc."""

# ==============================================================================
# HALLUCINATION DETECTION
# ==============================================================================
[hallucination]
enabled = false
method = "citation-check"
threshold = 0.8
fallback = "warn"

# ==============================================================================
# ANSWER FORMATTING
# ==============================================================================
[formatting]
output_format = "markdown"
include_sources = true
include_confidence = false
language = "fr"
