# RAG Facile Configuration - Legal Preset
# Legal documents: Strict citations, accuracy validation, precise terminology
# Use when: Legal research, policy documents, regulatory compliance

[meta]
schema_version = "1.0.0"
preset = "legal"

[eval]
provider = "albert"
target_samples = 75
output_format = "jsonl"

[ingestion]
file_types = [".pdf", ".md", ".txt"]

[ingestion.ocr]
enabled = true
dpi = 400  # High quality for legal documents
extract_images = false
include_bounding_boxes = true  # Precise location tracking

[ingestion.parsing]
output_format = "markdown"
preserve_structure = true  # Critical for legal structure
include_page_numbers = true  # Essential for citations

[chunking]
strategy = "paragraph"  # Legal text often organized by paragraph
chunk_size = 768  # Larger chunks for legal context
chunk_overlap = 100  # Ensure continuity of legal reasoning
preserve_metadata = true  # Track document/section/article numbers

[embedding]
model = "openweight-embeddings"
batch_size = 16
normalization = "L2"

[storage]
backend = "albert-collections"
collection_naming = "workspace"
distance_metric = "cosine"

[query]
rewrite_enabled = false  # Preserve exact legal terminology
expand_enabled = false  # Legal terms are precise
spell_check = true  # Catch typos but preserve legal terms

[retrieval]
method = "hybrid"  # Lexical important for exact legal terms
top_k = 15
score_threshold = 0.6  # Higher threshold for relevance

[retrieval.hybrid]
alpha = 0.3  # Weight lexical more (legal terminology is precise)

[reranking]
enabled = true  # Critical for legal accuracy
model = "openweight-rerank"
top_n = 5

[context]
strategy = "token-budget"
max_tokens = 6144  # Large context for legal reasoning
deduplicate = true
ordering = "by-document"  # Preserve document order for legal context

[context.formatting]
include_citations = true  # Mandatory for legal
citation_style = "footnote"  # Formal citation style

[generation]
model = "openweight-large"  # Best for legal reasoning
temperature = 0.3  # Low for consistency and accuracy
max_tokens = 1536
streaming = true
system_prompt = """You are a legal research assistant for the French government.
Provide precise, accurate answers based strictly on the provided legal context.
ALWAYS cite the specific document, article, or section for every claim using [1], [2], etc.
Use formal, precise legal language.
If information is not in the context, explicitly state it.
Never make assumptions or provide information not supported by the context."""

[hallucination]
enabled = true  # Essential for legal applications
method = "citation-check"  # Every claim must cite source
threshold = 0.95  # Very strict
fallback = "reject"  # Reject hallucinated responses

[formatting]
output_format = "markdown"
include_sources = true  # Show all sources consulted
include_confidence = true  # Transparency about certainty
language = "fr"
