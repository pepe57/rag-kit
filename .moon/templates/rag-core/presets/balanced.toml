# RAG Facile Configuration - Balanced Preset
# Recommended default with good quality/speed tradeoff
# Generated by: rag-facile setup

[meta]
schema_version = "1.0.0"
preset = "balanced"

# ==============================================================================
# EVALUATION DATASET GENERATION
# ==============================================================================
[eval]
provider = "albert"
target_samples = 50
output_format = "jsonl"

# ==============================================================================
# DOCUMENT INGESTION
# ==============================================================================
[ingestion]
provider = "albert"
file_types = [".pdf", ".md", ".txt"]

[ingestion.ocr]
enabled = true
dpi = 300
extract_images = false
include_bounding_boxes = false

[ingestion.parsing]
output_format = "markdown"
preserve_structure = true
include_page_numbers = true

# ==============================================================================
# DOCUMENT CHUNKING
# ==============================================================================
[chunking]
strategy = "semantic"
chunk_size = 1024
chunk_overlap = 100
preserve_metadata = true

# ==============================================================================
# EMBEDDING GENERATION
# ==============================================================================
[embedding]
model = "openweight-embeddings"
batch_size = 32
normalization = "L2"

# ==============================================================================
# VECTOR STORAGE / INDEX
# ==============================================================================
[storage]
provider = "albert-collections"
collection_naming = "workspace"
distance_metric = "cosine"
collections = [785]  # service-public (discover more with: rag-facile collections list)

# ==============================================================================
# QUERY EXPANSION
# ==============================================================================
[query]
strategy = "none"                    # "multi_query", "hyde", or "none" (default: off)
num_variations = 3                   # query variations to generate (multi_query only)
model = "openweight-medium"          # LLM model for expansion
include_original = true              # always include the original query alongside variants
# Legacy flags (kept for backward compatibility)
rewrite_enabled = false
expand_enabled = false
spell_check = false

# ==============================================================================
# RETRIEVAL
# ==============================================================================
[retrieval]
strategy = "hybrid"
top_k = 10
score_threshold = 0.0

[retrieval.hybrid]
alpha = 0.5  # Balanced semantic/lexical

# ==============================================================================
# RERANKING
# ==============================================================================
[reranking]
enabled = true
model = "openweight-rerank"
top_n = 5

# ==============================================================================
# CONTEXT SELECTION
# ==============================================================================
[context]
strategy = "token-budget"
max_tokens = 4096
deduplicate = true
ordering = "by-score"



# ==============================================================================
# RESPONSE GENERATION
# ==============================================================================
[generation]
model = "openweight-medium"
temperature = 0.2
max_tokens = 1024
streaming = true
system_prompt = """You are a helpful assistant for the French government.
Answer questions based on the provided context.
Always cite your sources using [1], [2], etc."""

# ==============================================================================
# HALLUCINATION DETECTION
# ==============================================================================
[hallucination]
enabled = false
strategy = "citation-check"
threshold = 0.8
fallback = "warn"

# ==============================================================================
# ANSWER FORMATTING
# ==============================================================================
[formatting]
output_format = "markdown"
include_confidence = false
language = "fr"

[formatting.citations]
enabled = true
style = "inline"
include_sources = true

# ==============================================================================
# TRACING & OBSERVABILITY
# ==============================================================================
[tracing]
enabled = true
provider = "sqlite"
database = ".rag-facile/traces.db"
