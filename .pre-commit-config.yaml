exclude: ^\.moon/templates/

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format
  - repo: local
    hooks:
      - id: regenerate-templates
        name: Regenerate Moon templates
        entry: bash -c 'uv run python tools/generate_templates.py --all --force && git add .moon/templates/'
        language: system
        files: ^(apps/(chainlit-chat|reflex-chat)|packages/(albert-client|rag-core|retrieval-albert|retrieval-basic))/
        pass_filenames: false
      - id: ty
        name: ty
        entry: uv run ty check --exclude ".moon/templates"
        language: system
        types: [python]
        pass_filenames: false
