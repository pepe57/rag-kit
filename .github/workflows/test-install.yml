name: Test Installation Scripts

on:
  pull_request:
    paths:
      - 'install.sh'
      - 'install.ps1'
      - '.prototools'
      - '.github/workflows/test-install.yml'
  push:
    branches:
      - main
    paths:
      - 'install.sh'
      - 'install.ps1'
      - '.prototools'
      - '.github/workflows/test-install.yml'

jobs:
  # ============================================================================
  # LINUX TESTS
  # ============================================================================
  
  linux-install:
    runs-on: ubuntu-latest
    name: "Install on Linux (Ubuntu)"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run bash installer
        shell: bash
        run: |
          bash <(curl -fsSL ${{ github.server_url }}/${{ github.repository }}/raw/${{ github.ref_name }}/install.sh)
      
      - name: Verify installation
        shell: bash
        run: |
          echo "=== Verifying tools ==="
          rag-facile --version
          proto --version
          moon --version
          uv --version
          just --version
      
      - name: Test just commands
        shell: bash
        run: |
          cd ${{ github.workspace }}
          echo "=== Testing just recipes ==="
          just --list
          just format-check
          just lint
  
  linux-proxy-simulation:
    runs-on: ubuntu-latest
    name: "Install on Linux (with proxy)"
    
    env:
      HTTP_PROXY: "http://proxy.example.com:8080"
      HTTPS_PROXY: "http://proxy.example.com:8080"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run bash installer with proxy env vars
        shell: bash
        run: |
          bash <(curl -fsSL ${{ github.server_url }}/${{ github.repository }}/raw/${{ github.ref_name }}/install.sh)
      
      - name: Verify .prototools was created
        shell: bash
        run: |
          if [ -f ~/.proto/.prototools ]; then
            echo "✓ .prototools created successfully"
            echo "Content:"
            cat ~/.proto/.prototools
          else
            echo "✗ .prototools not found"
            exit 1
          fi
      
      - name: Verify installation despite proxy
        shell: bash
        run: |
          rag-facile --version
          proto --version
  
  # ============================================================================
  # MACOS TESTS
  # ============================================================================
  
  macos-install-intel:
    runs-on: macos-12
    name: "Install on macOS (Intel)"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run bash installer
        shell: bash
        run: |
          bash <(curl -fsSL ${{ github.server_url }}/${{ github.repository }}/raw/${{ github.ref_name }}/install.sh)
      
      - name: Verify installation
        shell: bash
        run: |
          echo "=== System Info ==="
          uname -m
          bash --version | head -1
          echo ""
          echo "=== Verifying tools ==="
          rag-facile --version
          proto --version
          moon --version
          uv --version
          just --version
      
      - name: Test just commands
        shell: bash
        run: |
          cd ${{ github.workspace }}
          echo "=== Testing just recipes ==="
          just --list
          just format-check
          just lint
  
  macos-install-arm64:
    runs-on: macos-14
    name: "Install on macOS (Apple Silicon)"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run bash installer
        shell: bash
        run: |
          bash <(curl -fsSL ${{ github.server_url }}/${{ github.repository }}/raw/${{ github.ref_name }}/install.sh)
      
      - name: Verify installation
        shell: bash
        run: |
          echo "=== System Info ==="
          uname -m
          bash --version | head -1
          echo ""
          echo "=== Verifying tools ==="
          rag-facile --version
          proto --version
          moon --version
          uv --version
          just --version
      
      - name: Test just commands
        shell: bash
        run: |
          cd ${{ github.workspace }}
          echo "=== Testing just recipes ==="
          just --list
          just format-check
          just lint
  
  macos-proxy-simulation:
    runs-on: macos-latest
    name: "Install on macOS (with proxy)"
    
    env:
      HTTP_PROXY: "http://proxy.example.com:8080"
      HTTPS_PROXY: "http://proxy.example.com:8080"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run bash installer with proxy env vars
        shell: bash
        run: |
          bash <(curl -fsSL ${{ github.server_url }}/${{ github.repository }}/raw/${{ github.ref_name }}/install.sh)
      
      - name: Verify .prototools was created
        shell: bash
        run: |
          if [ -f ~/.proto/.prototools ]; then
            echo "✓ .prototools created successfully"
            echo "Content:"
            cat ~/.proto/.prototools
          else
            echo "✗ .prototools not found"
            exit 1
          fi
      
      - name: Verify installation despite proxy
        shell: bash
        run: |
          rag-facile --version
          proto --version
  
  # ============================================================================
  # WINDOWS TESTS
  # ============================================================================
  
  windows-install-powershell:
    runs-on: windows-latest
    name: "Install on Windows (PowerShell)"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run PowerShell installer
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -Command "& { irm ${{ github.server_url }}/${{ github.repository }}/raw/${{ github.ref_name }}/install.ps1 | iex }"
      
      - name: Verify installation
        shell: powershell
        run: |
          Write-Host "=== Verifying tools ===" -ForegroundColor Cyan
          rag-facile --version
          proto --version
          moon --version
          uv --version
          just --version
      
      - name: Test just commands
        shell: powershell
        run: |
          Set-Location ${{ github.workspace }}
          Write-Host "=== Testing just recipes ===" -ForegroundColor Cyan
          just --list
          just format-check
          just lint
  
  windows-install-gitbash:
    runs-on: windows-latest
    name: "Install on Windows (Git Bash)"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run bash installer
        shell: bash
        run: |
          bash <(curl -fsSL ${{ github.server_url }}/${{ github.repository }}/raw/${{ github.ref_name }}/install.sh)
      
      - name: Verify installation
        shell: bash
        run: |
          echo "=== Verifying tools ==="
          rag-facile --version
          proto --version
          moon --version
          uv --version
          just --version
      
      - name: Test just commands
        shell: bash
        run: |
          cd ${{ github.workspace }}
          echo "=== Testing just recipes ==="
          just --list
          just format-check
          just lint
  
  windows-proxy-simulation:
    runs-on: windows-latest
    name: "Install on Windows (with proxy)"
    
    env:
      HTTP_PROXY: "http://proxy.example.com:8080"
      HTTPS_PROXY: "http://proxy.example.com:8080"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run PowerShell installer with proxy env vars
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -Command "& { irm ${{ github.server_url }}/${{ github.repository }}/raw/${{ github.ref_name }}/install.ps1 | iex }"
      
      - name: Verify .prototools was created
        shell: powershell
        run: |
          $PrototoolsPath = "$env:USERPROFILE\.proto\.prototools"
          if (Test-Path $PrototoolsPath) {
            Write-Host "✓ .prototools created successfully" -ForegroundColor Green
            Write-Host "Content:"
            Get-Content $PrototoolsPath
          } else {
            Write-Host "✗ .prototools not found" -ForegroundColor Red
            exit 1
          }
      
      - name: Verify installation despite proxy
        shell: powershell
        run: |
          rag-facile --version
          proto --version
  
  # ============================================================================
  # SUMMARY JOB
  # ============================================================================
  
  test-summary:
    runs-on: ubuntu-latest
    name: "Installation Tests Summary"
    needs: [linux-install, linux-proxy-simulation, macos-install-intel, macos-install-arm64, macos-proxy-simulation, windows-install-powershell, windows-install-gitbash, windows-proxy-simulation]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          echo "=== Installation Test Results ==="
          echo "Linux (Ubuntu): ${{ needs.linux-install.result }}"
          echo "Linux (Proxy): ${{ needs.linux-proxy-simulation.result }}"
          echo "macOS (Intel): ${{ needs.macos-install-intel.result }}"
          echo "macOS (ARM64): ${{ needs.macos-install-arm64.result }}"
          echo "macOS (Proxy): ${{ needs.macos-proxy-simulation.result }}"
          echo "Windows (PowerShell): ${{ needs.windows-install-powershell.result }}"
          echo "Windows (Git Bash): ${{ needs.windows-install-gitbash.result }}"
          echo "Windows (Proxy): ${{ needs.windows-proxy-simulation.result }}"
          
          # Fail if any test failed
          if [[ "${{ needs.linux-install.result }}" == "failure" || \
                "${{ needs.linux-proxy-simulation.result }}" == "failure" || \
                "${{ needs.macos-install-intel.result }}" == "failure" || \
                "${{ needs.macos-install-arm64.result }}" == "failure" || \
                "${{ needs.macos-proxy-simulation.result }}" == "failure" || \
                "${{ needs.windows-install-powershell.result }}" == "failure" || \
                "${{ needs.windows-install-gitbash.result }}" == "failure" || \
                "${{ needs.windows-proxy-simulation.result }}" == "failure" ]]; then
            echo "❌ One or more installation tests failed"
            exit 1
          fi
          
          echo "✅ All installation tests passed!"
