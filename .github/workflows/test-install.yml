name: Test Installation Scripts

on:
  pull_request:
    paths:
      - 'install.sh'
      - 'install.ps1'
      - '.prototools'
      - '.github/workflows/test-install.yml'
  push:
    branches:
      - main
    paths:
      - 'install.sh'
      - 'install.ps1'
      - '.prototools'
      - '.github/workflows/test-install.yml'

# Minimal permissions: workflow only needs to read repo contents
permissions:
  contents: read

jobs:
  # ============================================================================
  # LINUX TESTS
  # ============================================================================
  
  linux-install:
    runs-on: ubuntu-latest
    name: "Install on Linux (Ubuntu)"
    
    env:
      RAG_FACILE_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run bash installer
        shell: bash
        run: |
          curl -fsSL ${{ github.server_url }}/${{ github.repository }}/raw/refs/heads/${{ github.event.pull_request.head.ref || github.ref_name }}/install.sh -o /tmp/install.sh
          bash -x /tmp/install.sh 2>&1 || (echo "=== Installer failed with exit code $? ===" && tail -50 /tmp/install.log 2>/dev/null || echo "No log file" && exit 1)
      
      - name: Verify installation
        shell: bash
        run: |
          echo "=== Verifying tools ==="
          rag-facile --version
          proto --version
          moon --version
          uv --version
          just --version
      
      - name: Test just commands
        shell: bash
        run: |
          echo "=== Testing just recipes ==="
          just --list
  
  macos-install-arm64:
    runs-on: macos-14
    name: "Install on macOS (Apple Silicon)"
    
    env:
      RAG_FACILE_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run bash installer
        shell: bash
        run: |
          curl -fsSL ${{ github.server_url }}/${{ github.repository }}/raw/refs/heads/${{ github.event.pull_request.head.ref || github.ref_name }}/install.sh -o /tmp/install.sh
          bash -x /tmp/install.sh 2>&1 || (echo "=== Installer failed ===" && exit 1)
      
      - name: Verify installation
        shell: bash
        run: |
          echo "=== System Info ==="
          uname -m
          bash --version | head -1
          echo ""
          echo "=== Verifying tools ==="
          rag-facile --version
          proto --version
          moon --version
          uv --version
          just --version
      
      - name: Test just commands
        shell: bash
        env:
          PYTHONUTF8: "1"  # Force UTF-8 encoding for Python
        run: |
          echo "=== Testing just recipes ==="
          just --list
  
  windows-install-powershell:
    runs-on: windows-latest
    name: "Install on Windows (PowerShell)"
    
    env:
      RAG_FACILE_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run PowerShell installer
        shell: powershell
        run: |
          irm ${{ github.server_url }}/${{ github.repository }}/raw/refs/heads/${{ github.event.pull_request.head.ref || github.ref_name }}/install.ps1 | iex
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Installer failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
      
      - name: Verify installation
        shell: powershell
        env:
          PYTHONUTF8: "1"  # Force UTF-8 encoding for Python (Windows defaults to CP1252)
        run: |
          Write-Host "=== Verifying tools ===" -ForegroundColor Cyan
          rag-facile --version
          proto --version
          moon --version
          uv --version
          just --version
      
      - name: Test just commands
        shell: powershell
        env:
          PYTHONUTF8: "1"  # Force UTF-8 encoding for Python
        run: |
          Write-Host "=== Testing just recipes ===" -ForegroundColor Cyan
          just --list
          just format-check
          just lint
  
  windows-install-gitbash:
    runs-on: windows-latest
    name: "Install on Windows (Git Bash)"
    
    env:
      RAG_FACILE_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run bash installer
        shell: bash
        run: |
          curl -fsSL ${{ github.server_url }}/${{ github.repository }}/raw/refs/heads/${{ github.event.pull_request.head.ref || github.ref_name }}/install.sh -o /tmp/install.sh
          bash -x /tmp/install.sh 2>&1 || (echo "=== Installer failed ===" && exit 1)
      
      - name: Verify installation
        shell: bash
        env:
          PYTHONUTF8: "1"  # Force UTF-8 encoding for Python (Git Bash defaults to CP1252)
        run: |
          echo "=== Verifying tools ==="
          rag-facile --version
          proto --version
          moon --version
          uv --version
          just --version
      
      - name: Test just commands
        shell: bash
        env:
          PYTHONUTF8: "1"  # Force UTF-8 encoding for Python
        run: |
          echo "=== Testing just recipes ==="
          just --list
  
  test-summary:
    runs-on: ubuntu-latest
    name: "Installation Tests Summary"
    needs: [linux-install, macos-install-arm64, windows-install-powershell, windows-install-gitbash]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          echo "=== Installation Test Results ==="
          echo "Linux (Ubuntu): ${{ needs.linux-install.result }}"
          echo "macOS (ARM64): ${{ needs.macos-install-arm64.result }}"
          echo "Windows (PowerShell): ${{ needs.windows-install-powershell.result }}"
          echo "Windows (Git Bash): ${{ needs.windows-install-gitbash.result }}"
          
          # Fail if any test failed
          if [[ "${{ needs.linux-install.result }}" == "failure" || \
                "${{ needs.macos-install-arm64.result }}" == "failure" || \
                "${{ needs.windows-install-powershell.result }}" == "failure" || \
                "${{ needs.windows-install-gitbash.result }}" == "failure" ]]; then
            echo "❌ One or more installation tests failed"
            exit 1
          fi
          
          echo "✅ All installation tests passed!"
