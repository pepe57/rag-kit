name: Check Install

on:
  pull_request:
    paths:
      # Installer scripts
      - 'install.sh'
      - 'install.ps1'
      - '.prototools'
      
      # CLI changes (packaging, bundling, dependencies)
      - 'apps/cli/**'
      - '!apps/cli/**/*.md'
      
      # Package structure (bundled with CLI)
      - 'packages/**/pyproject.toml'
      - 'packages/**/src/**'
      
      # Templates (bundled with CLI)
      - '.moon/templates/**'
      - '!.moon/templates/**/*.md'
      
      # This workflow
      - '.github/workflows/check-install.yml'
  push:
    branches:
      - main
    paths:
      # Installer scripts
      - 'install.sh'
      - 'install.ps1'
      - '.prototools'
      
      # CLI changes (packaging, bundling, dependencies)
      - 'apps/cli/**'
      - '!apps/cli/**/*.md'
      
      # Package structure (bundled with CLI)
      - 'packages/**/pyproject.toml'
      - 'packages/**/src/**'
      
      # Templates (bundled with CLI)
      - '.moon/templates/**'
      - '!.moon/templates/**/*.md'
      
      # This workflow
      - '.github/workflows/check-install.yml'

# Minimal permissions: workflow only needs to read repo contents
permissions:
  contents: read

jobs:
  # ============================================================================
  # LINUX TESTS
  # ============================================================================
  
  linux-install:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: "Install on Linux (Ubuntu)"
    
    env:
      RAG_FACILE_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run bash installer
        shell: bash
        run: |
          curl -fsSL ${{ github.server_url }}/${{ github.repository }}/raw/refs/heads/${{ github.event.pull_request.head.ref || github.ref_name }}/install.sh -o /tmp/install.sh
          bash -x /tmp/install.sh 2>&1 || (echo "=== Installer failed with exit code $? ===" && tail -50 /tmp/install.log 2>/dev/null || echo "No log file" && exit 1)
      
      - name: Verify installation
        shell: bash
        run: |
          echo "=== Verifying tools ==="
          rag-facile --version
          proto --version
          moon --version
          uv --version
          just --version
      
      - name: Test just commands
        shell: bash
        run: |
          echo "=== Testing just recipes ==="
          just --list
      
      - name: Smoke test — setup, build and launch app
        shell: bash
        env:
          OPENAI_API_KEY: "test-key-for-ci"
          OPENAI_BASE_URL: "https://albert.api.etalab.gouv.fr/v1"
        run: |
          echo "=== Smoke test: scaffold → build → launch → health check ==="
          
          # 1. Scaffold a standalone Chainlit app (non-interactive)
          rag-facile setup /tmp/test-app --preset balanced --yes --no-serve --force
          
          # 2. Start Chainlit server in background
          cd /tmp/test-app
          uv run chainlit run app.py --host 0.0.0.0 --port 8000 &
          SERVER_PID=$!
          
          # 3. Wait for server to respond (max 60s, poll every 2s)
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Server responded with HTTP 200 after ~$((i * 2)) seconds"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Server did not respond within 60 seconds (last status: $STATUS)"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 2
          done
          
          # 4. Cleanup
          kill $SERVER_PID 2>/dev/null || true
  
  macos-install-arm64:
    runs-on: macos-14
    timeout-minutes: 10
    name: "Install on macOS (Apple Silicon)"
    
    env:
      RAG_FACILE_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run bash installer
        shell: bash
        run: |
          curl -fsSL ${{ github.server_url }}/${{ github.repository }}/raw/refs/heads/${{ github.event.pull_request.head.ref || github.ref_name }}/install.sh -o /tmp/install.sh
          bash -x /tmp/install.sh 2>&1 || (echo "=== Installer failed ===" && exit 1)
      
      - name: Verify installation
        shell: bash
        run: |
          echo "=== System Info ==="
          uname -m
          bash --version | head -1
          echo ""
          echo "=== Verifying tools ==="
          rag-facile --version
          proto --version
          moon --version
          uv --version
          just --version
      
      - name: Test just commands
        shell: bash
        env:
          PYTHONUTF8: "1"  # Force UTF-8 encoding for Python
        run: |
          echo "=== Testing just recipes ==="
          just --list
      
      - name: Smoke test — setup, build and launch app
        shell: bash
        env:
          OPENAI_API_KEY: "test-key-for-ci"
          OPENAI_BASE_URL: "https://albert.api.etalab.gouv.fr/v1"
          PYTHONUTF8: "1"
        run: |
          echo "=== Smoke test: scaffold → build → launch → health check ==="
          
          # 1. Scaffold a standalone Chainlit app (non-interactive)
          rag-facile setup /tmp/test-app --preset balanced --yes --no-serve --force
          
          # 2. Start Chainlit server in background
          cd /tmp/test-app
          uv run chainlit run app.py --host 0.0.0.0 --port 8000 &
          SERVER_PID=$!
          
          # 3. Wait for server to respond (max 60s, poll every 2s)
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Server responded with HTTP 200 after ~$((i * 2)) seconds"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Server did not respond within 60 seconds (last status: $STATUS)"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 2
          done
          
          # 4. Cleanup
          kill $SERVER_PID 2>/dev/null || true
  
  windows-install-powershell:
    runs-on: windows-latest
    timeout-minutes: 10
    name: "Install on Windows (PowerShell)"
    
    env:
      RAG_FACILE_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full git history needed for moon format-check/lint
      
      - name: Run PowerShell installer
        shell: powershell
        run: |
          irm ${{ github.server_url }}/${{ github.repository }}/raw/refs/heads/${{ github.event.pull_request.head.ref || github.ref_name }}/install.ps1 | iex
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Installer failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
      
      - name: Verify installation
        shell: powershell
        env:
          PYTHONUTF8: "1"  # Force UTF-8 encoding for Python (Windows defaults to CP1252)
        run: |
          Write-Host "=== Verifying tools ===" -ForegroundColor Cyan
          rag-facile --version
          proto --version
          moon --version
          uv --version
          just --version
      
      - name: Test just commands
        shell: powershell
        env:
          PYTHONUTF8: "1"  # Force UTF-8 encoding for Python
        run: |
          Write-Host "=== Testing just recipes ===" -ForegroundColor Cyan
          just --list
          just format-check
          just lint
  
  windows-install-gitbash:
    runs-on: windows-latest
    timeout-minutes: 10
    name: "Install on Windows (Git Bash)"
    
    env:
      RAG_FACILE_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run bash installer
        shell: bash
        run: |
          curl -fsSL ${{ github.server_url }}/${{ github.repository }}/raw/refs/heads/${{ github.event.pull_request.head.ref || github.ref_name }}/install.sh -o /tmp/install.sh
          bash -x /tmp/install.sh 2>&1 || (echo "=== Installer failed ===" && exit 1)
      
      - name: Verify installation
        shell: bash
        env:
          PYTHONUTF8: "1"  # Force UTF-8 encoding for Python (Git Bash defaults to CP1252)
        run: |
          echo "=== Verifying tools ==="
          rag-facile --version
          proto --version
          moon --version
          uv --version
          just --version
      
      - name: Test just commands
        shell: bash
        env:
          PYTHONUTF8: "1"  # Force UTF-8 encoding for Python
        run: |
          echo "=== Testing just recipes ==="
          just --list
  
  test-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    name: "Installation Tests Summary"
    needs: [linux-install, macos-install-arm64, windows-install-powershell, windows-install-gitbash]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          echo "=== Installation Test Results ==="
          echo "Linux (Ubuntu): ${{ needs.linux-install.result }}"
          echo "macOS (ARM64): ${{ needs.macos-install-arm64.result }}"
          echo "Windows (PowerShell): ${{ needs.windows-install-powershell.result }}"
          echo "Windows (Git Bash): ${{ needs.windows-install-gitbash.result }}"
          
          # Fail if any test failed
          if [[ "${{ needs.linux-install.result }}" == "failure" || \
                "${{ needs.macos-install-arm64.result }}" == "failure" || \
                "${{ needs.windows-install-powershell.result }}" == "failure" || \
                "${{ needs.windows-install-gitbash.result }}" == "failure" ]]; then
            echo "❌ One or more installation tests failed"
            exit 1
          fi
          
          echo "✅ All installation tests passed!"
