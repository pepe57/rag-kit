name: Check Install

# Validates install.sh across platforms:
#  1. Run install.sh (installs uv, just, rag-facile as a global tool)
#  2. Verify rag-facile --version, just --version, uv --version

on:
  pull_request:
    paths:
      - 'install.sh'
      - 'apps/cli/**'
      - '!apps/cli/**/*.md'
      - 'packages/**/pyproject.toml'
      - 'packages/**/src/**'
      - '.github/workflows/check-install.yml'
  push:
    branches:
      - main
    paths:
      - 'install.sh'
      - 'apps/cli/**'
      - '!apps/cli/**/*.md'
      - 'packages/**/pyproject.toml'
      - 'packages/**/src/**'
      - '.github/workflows/check-install.yml'

permissions:
  contents: read

jobs:
  # ============================================================================
  # LINUX SMOKE TEST
  # ============================================================================

  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: "Install on Linux (Ubuntu)"

    steps:
      - uses: actions/checkout@v4

      - name: Run installer
        run: bash install.sh

      - name: Verify tools are available
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          just --version
          uv --version
          rag-facile --version

  # ============================================================================
  # MACOS SMOKE TEST
  # ============================================================================

  test-macos:
    runs-on: macos-14
    timeout-minutes: 15
    name: "Install on macOS (Apple Silicon)"

    steps:
      - uses: actions/checkout@v4

      - name: Run installer
        run: bash install.sh

      - name: Verify tools are available
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          just --version
          uv --version
          rag-facile --version

  # ============================================================================
  # WINDOWS SMOKE TEST (Git Bash)
  # ============================================================================

  test-windows:
    runs-on: windows-latest
    timeout-minutes: 15
    name: "Install on Windows (Git Bash)"

    steps:
      - uses: actions/checkout@v4

      - name: Run installer (Git Bash)
        shell: bash
        run: bash install.sh

      - name: Verify tools are available
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          just --version
          uv --version
          rag-facile --version

  # ============================================================================
  # SUMMARY
  # ============================================================================

  test-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    name: "Installation Tests Summary"
    needs: [test-linux, test-macos, test-windows]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "=== Installation Test Results ==="
          echo "Linux (Ubuntu):     ${{ needs.test-linux.result }}"
          echo "macOS (ARM64):      ${{ needs.test-macos.result }}"
          echo "Windows (Git Bash): ${{ needs.test-windows.result }}"

          if [[ "${{ needs.test-linux.result }}"   == "failure" || \
                "${{ needs.test-macos.result }}"   == "failure" || \
                "${{ needs.test-windows.result }}" == "failure" ]]; then
            echo "❌ One or more tests failed"
            exit 1
          fi

          echo "✅ All installation tests passed!"
